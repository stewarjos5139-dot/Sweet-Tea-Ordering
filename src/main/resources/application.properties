# ===========================================
# 甜趣奶茶点单系统 - 应用配置
# ===========================================

# 服务端口
server.port=8080

# MySQL 数据源配置（请根据你的本地 MySQL 修改用户名和密码）
spring.datasource.url=jdbc:mysql://localhost:3306/sweet_tea_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=ZHB123456zhb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 连接池配置（HikariCP - SpringBoot 默认）
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# 静态资源缓存（开发阶段关闭缓存方便调试）
spring.web.resources.cache.period=0

# JSON 日期格式
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai

# 日志级别
logging.level.com.sweettea=DEBUG
