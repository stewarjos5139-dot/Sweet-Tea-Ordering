<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>个人中心 - 甜趣奶茶</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="css/common.css">
</head>
<body>

<header class="desktop-header" id="mainHeader">
  <div class="header-inner">
    <a href="index.html" class="header-brand">
      <div class="brand-icon"><i class="fa fa-leaf"></i></div>甜趣奶茶
    </a>
    <nav class="header-nav">
      <a class="nav-link" href="index.html">首页</a>
      <a class="nav-link" href="category.html">分类浏览</a>
      <a class="nav-link" href="list.html">全部商品</a>
      <a class="nav-link active" href="profile.html">个人中心</a>
    </nav>
    <a href="profile.html" class="header-user-btn"><i class="fa fa-user-o"></i></a>
  </div>
</header>

<div class="page-container">
  <div class="profile-layout">

    <!-- 左侧信息 -->
    <div class="profile-sidebar">
      <div class="profile-avatar-area">
        <div class="pa-circle"><i class="fa fa-user-o"></i></div>
        <h3 id="profileName">未登录</h3>
        <div class="pa-uid" id="profileUsername"></div>
        <div class="pa-addr" id="profileAddr"></div>
      </div>

      <!-- 未登录 -->
      <div id="loginPrompt" style="text-align:center;padding:12px 0">
        <p style="color:var(--color-text-muted);margin-bottom:14px;font-size:14px">登录后查看订单和收货地址</p>
        <button class="btn-primary-lg" onclick="location.href='login.html'" style="width:100%">立即登录</button>
      </div>

      <!-- 菜单 -->
      <div class="profile-menu-box" id="profileMenu" style="display:none">
        <div class="pm-item" onclick="location.href='list.html'">
          <div class="pm-icon" style="background:var(--color-accent)"><i class="fa fa-search"></i></div>
          <span>浏览商品</span>
          <i class="fa fa-chevron-right" style="color:var(--color-text-muted);margin-left:auto"></i>
        </div>
        <div class="pm-item" onclick="location.href='index.html'">
          <div class="pm-icon" style="background:var(--color-primary)"><i class="fa fa-home"></i></div>
          <span>返回首页</span>
          <i class="fa fa-chevron-right" style="color:var(--color-text-muted);margin-left:auto"></i>
        </div>
      </div>

      <!-- 退出 -->
      <div class="mt-auto text-center" id="logoutRow" style="display:none;padding-top:16px">
        <button class="btn-outline-lg" id="btnLogout" style="border-color:#DC2626;color:#DC2626">
          <i class="fa fa-sign-out"></i> 退出登录
        </button>
      </div>
    </div>

    <!-- 右侧订单 -->
    <div class="profile-main">
      <div class="pm-title" id="orderSection" style="display:none">📋 我的订单</div>
      <div class="order-card-list" id="orderList"></div>
      <div id="orderEmptyHint" style="text-align:center;padding:80px 20px;color:var(--color-text-muted)">
        <div style="font-size:64px;margin-bottom:16px;opacity:.3">📭</div>
        <p style="font-size:15px">登录后可查看您的历史订单</p>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
