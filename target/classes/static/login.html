<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>登录 - 甜趣奶茶</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="css/common.css">
</head>
<body>

<div class="login-fullpage">
  <!-- 左侧品牌视觉 -->
  <div class="login-visual">
    <div class="login-visual-content">
      <div class="lv-icon">🧋</div>
      <h1>甜趣奶茶</h1>
      <p>登录你的账户，开启甜蜜之旅</p>
    </div>
  </div>

  <!-- 右侧表单 -->
  <div class="login-form-panel">
    <div class="lf-header">
      <h2>欢迎回来 👋</h2>
      <p>登录后享受会员专属优惠</p>
    </div>
    <div class="login-form">
      <div class="input-wrap">
        <span class="iw-icon"><i class="fa fa-user-o"></i></span>
        <input type="text" id="username" placeholder="用户名" maxlength="30">
      </div>
      <div class="input-wrap">
        <span class="iw-icon"><i class="fa fa-lock"></i></span>
        <input type="password" id="password" placeholder="密码" maxlength="30">
      </div>
      <p class="login-error-msg" id="loginError"></p>
      <button class="btn-login-full" id="btnLogin" onclick="doLogin()">登 录</button>
    </div>
    <p class="login-hint-text">
      测试账户 <code>testuser</code> / <code>123456</code>
    </p>
    <a href="index.html" class="login-back-link">← 返回首页</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
<script>
function doLogin(){
  var u=$('#username').val().trim(),p=$('#password').val().trim();
  if(!u){$('#username').focus();return}if(!p){$('#password').focus();return}
  $('#btnLogin').prop('disabled',true).text('登录中…');$('#loginError').hide();
  $.ajax({url:'/api/user/login',type:'POST',contentType:'application/json',
    data:JSON.stringify({username:u,password:p}),dataType:'json',
    success:function(r){
      if(r.code===200){var q=new URLSearchParams(location.search);location.href=q.get('redirect')||'profile.html'}
      else{$('#loginError').text(r.message||'登录失败').show();$('#btnLogin').prop('disabled',false).text('登 录')}
    },
    error:function(){$('#loginError').text('网络错误').show();$('#btnLogin').prop('disabled',false).text('登 录')}
  });
}
$('#password').keydown(function(e){if(e.key==='Enter')doLogin()});
$('#username').keydown(function(e){if(e.key==='Enter')$('#password').focus()});
</script>
</body>
</html>
