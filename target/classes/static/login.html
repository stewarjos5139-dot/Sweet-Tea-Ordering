<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 甜趣奶茶</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/common.css">
    <style>
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 24px;
            background: linear-gradient(180deg, #FFF8F0 0%, #FFE8D6 100%);
        }
        .login-logo {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 8px;
        }
        .login-logo + h2 {
            font-weight: 700;
            color: var(--text-dark);
            margin: 0 0 4px;
        }
        .login-logo + h2 + p {
            color: var(--text-gray);
            font-size: 13px;
            margin-bottom: 32px;
        }
        .login-form {
            width: 100%;
            max-width: 340px;
        }
        .login-form .input-group {
            margin-bottom: 16px;
            position: relative;
        }
        .login-form .input-group .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
            font-size: 16px;
            z-index: 2;
        }
        .login-form .form-control {
            height: 48px;
            border-radius: 24px;
            padding-left: 42px;
            border: 1.5px solid var(--border);
            font-size: 14px;
            box-shadow: none;
            transition: border-color 0.2s;
        }
        .login-form .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
        }
        .btn-login {
            width: 100%;
            height: 48px;
            border-radius: 24px;
            background: var(--primary);
            color: #fff;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover {
            background: var(--primary-dark);
        }
        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .login-error {
            color: #E53935;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        .login-hint {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-gray);
        }
        .login-hint code {
            background: #FFF0E8;
            padding: 2px 8px;
            border-radius: 4px;
            color: var(--primary);
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-logo">
        <i class="fa fa-leaf"></i>
    </div>
    <h2>甜趣奶茶</h2>
    <p>登录后享受更多优惠</p>

    <div class="login-form">
        <div class="input-group">
            <span class="input-icon"><i class="fa fa-user-o"></i></span>
            <input type="text" class="form-control" id="username" placeholder="请输入用户名" maxlength="30">
        </div>
        <div class="input-group">
            <span class="input-icon"><i class="fa fa-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="请输入密码" maxlength="30">
        </div>
        <p class="login-error" id="loginError">用户名或密码错误</p>
        <button class="btn-login" id="btnLogin" onclick="doLogin()">登 录</button>
    </div>

    <p class="login-hint">
        测试账号：<code>testuser</code> 密码：<code>123456</code>
    </p>

    <a href="index.html" style="margin-top:20px;font-size:13px;color:var(--text-gray);">
        <i class="fa fa-chevron-left"></i> 返回首页
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
<script>
    /**
     * 登录逻辑（内嵌于 login.html，简单无需单独 JS 文件）
     */
    function doLogin() {
        var username = $('#username').val().trim();
        var password = $('#password').val().trim();

        if (!username) { $('#username').focus(); return; }
        if (!password) { $('#password').focus(); return; }

        $('#btnLogin').prop('disabled', true).text('登录中…');
        $('#loginError').hide();

        $.ajax({
            url: '/api/user/login',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ username: username, password: password }),
            dataType: 'json',
            success: function (res) {
                if (res.code === 200) {
                    // 登录成功 → 跳转
                    var urlParams = new URLSearchParams(window.location.search);
                    var redirect = urlParams.get('redirect') || 'profile.html';
                    location.href = redirect;
                } else {
                    $('#loginError').text(res.message || '登录失败').show();
                    $('#btnLogin').prop('disabled', false).text('登 录');
                }
            },
            error: function () {
                $('#loginError').text('网络错误，请稍后再试').show();
                $('#btnLogin').prop('disabled', false).text('登 录');
            }
        });
    }

    // 回车登录
    $('#password').on('keydown', function (e) {
        if (e.key === 'Enter' || e.keyCode === 13) {
            doLogin();
        }
    });
    $('#username').on('keydown', function (e) {
        if (e.key === 'Enter' || e.keyCode === 13) {
            $('#password').focus();
        }
    });
</script>
</body>
</html>
