<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>甜趣奶茶 - 每一杯都是甜蜜的邂逅</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="css/common.css">
</head>
<body>

<!-- ====== Header ====== -->
<header class="desktop-header" id="mainHeader">
  <div class="header-inner">
    <a href="index.html" class="header-brand">
      <div class="brand-icon"><i class="fa fa-leaf"></i></div>
      甜趣奶茶
    </a>
    <nav class="header-nav">
      <a class="nav-link active" href="index.html">首页</a>
      <a class="nav-link" href="category.html">分类浏览</a>
      <a class="nav-link" href="list.html">全部商品</a>
      <a class="nav-link" href="profile.html">个人中心</a>
    </nav>
    <a href="profile.html" class="header-user-btn"><i class="fa fa-user-o"></i></a>
  </div>
</header>

<div class="page-container">

  <!-- ====== Hero ====== -->
  <section class="hero-banner">
    <div class="hero-deco-2"></div>
    <div class="hero-text">
      <div class="hero-badge">✨ 夏日特供 · 新品上市</div>
      <h1>每一杯，<br>都是<span class="highlight">甜蜜</span>的邂逅</h1>
      <p>精选当季鲜果，手工现调，让每一口都充满惊喜。新用户首单立享 ¥5 优惠。</p>
      <div class="hero-btns">
        <button class="btn-hero-primary" onclick="location.href='list.html'">探索全部饮品</button>
        <button class="btn-hero-outline" onclick="location.href='category.html?cid=1'">果茶系列</button>
      </div>
    </div>
    <div class="hero-visual">
      <div class="hero-float-card">
        <div class="fc-emoji">🧋</div>
        <div class="fc-title">招牌珍珠奶茶</div>
        <div class="fc-price"><small>¥</small>14</div>
      </div>
      <div class="hero-float-card-2">
        <div class="fc2-row">
          <div class="fc2-dot"></div>
          <span class="fc2-text">今日已售 237 杯</span>
        </div>
      </div>
    </div>
  </section>

  <!-- ====== 分类导航 ====== -->
  <div class="section-head">
    <div class="sh-label">Categories</div>
    <h2>探索你喜爱的口味</h2>
    <p>从清爽果茶到浓香奶茶，总有一杯适合你</p>
  </div>
  <div class="category-pills">
    <div class="cat-pill" onclick="location.href='category.html?cid=1'">
      <div class="cp-icon cp-1"><i class="fa fa-lemon-o"></i></div> 果茶
    </div>
    <div class="cat-pill" onclick="location.href='category.html?cid=2'">
      <div class="cp-icon cp-2"><i class="fa fa-coffee"></i></div> 奶茶
    </div>
    <div class="cat-pill" onclick="location.href='category.html?cid=3'">
      <div class="cp-icon cp-3"><i class="fa fa-moon-o"></i></div> 咖啡
    </div>
    <div class="cat-pill" onclick="location.href='category.html?cid=4'">
      <div class="cp-icon cp-4"><i class="fa fa-cutlery"></i></div> 小食
    </div>
  </div>

  <!-- ====== 热门推荐 ====== -->
  <div class="section-title-bar">
    <h3>🔥 热门推荐</h3>
    <a href="list.html" class="more-link">查看全部 <i class="fa fa-arrow-right"></i></a>
  </div>
  <div class="product-grid-4" id="recommendGrid">
    <div class="empty-state">
      <div class="es-icon">☕</div>
      <p>正在加载推荐…</p>
    </div>
  </div>

  <!-- ====== CTA Banner ====== -->
  <div class="cta-banner">
    <div class="cta-text">
      <h3>🎁 新用户首单立减 ¥5</h3>
      <p>注册即可领取，全场饮品通用</p>
    </div>
    <button class="cta-btn" onclick="location.href='login.html'">立即领取</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"></script>
<script src="js/index.js"></script>
</body>
</html>
