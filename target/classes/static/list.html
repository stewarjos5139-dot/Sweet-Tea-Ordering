<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全部商品 - 甜趣奶茶</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/common.css">
    <style>
        /* 搜索栏 */
        .search-bar-wrap {
            padding: 10px 16px;
            background: var(--white);
            position: sticky;
            top: 0;
            z-index: 99;
        }
        .search-bar {
            display: flex;
            align-items: center;
            background: var(--bg-light);
            border-radius: 24px;
            padding: 8px 16px;
            gap: 8px;
        }
        .search-bar i {
            color: var(--text-gray);
            font-size: 16px;
        }
        .search-bar input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: var(--text-dark);
            min-width: 0;
        }
        .search-bar input::placeholder {
            color: #C0B0A8;
        }
        .search-bar .btn-search {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        /* 瀑布流 - 两列 */
        .waterfall {
            column-count: 2;
            column-gap: 10px;
            padding: 12px 16px;
        }
        .waterfall .wf-card {
            break-inside: avoid;
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.15s;
        }
        .waterfall .wf-card:hover {
            transform: translateY(-2px);
        }
        .waterfall .wf-card img {
            width: 100%;
            display: block;
            background: #F5E6D8;
        }
        .waterfall .wf-card .wf-info {
            padding: 10px;
        }
        .waterfall .wf-card .wf-info h5 {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 4px;
            color: var(--text-dark);
        }
        .waterfall .wf-card .wf-info .wf-desc {
            font-size: 11px;
            color: var(--text-gray);
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .waterfall .wf-card .wf-info .wf-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .waterfall .wf-card .wf-info .wf-price {
            font-size: 17px;
            font-weight: 700;
            color: var(--primary);
        }
        .waterfall .wf-card .wf-info .wf-price::before {
            content: '¥';
            font-size: 12px;
        }
        .waterfall .wf-card .wf-info .btn-add {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            border: none;
            font-size: 16px;
            line-height: 30px;
            text-align: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .waterfall .wf-card .wf-info .btn-add:hover {
            background: var(--primary-dark);
        }

        /* 加载更多提示 */
        .load-more-tip {
            text-align: center;
            padding: 16px;
            color: var(--text-gray);
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="page-container">

    <!-- ========== 顶部导航 ========== -->
    <div class="top-nav">
        <div class="brand">
            <i class="fa fa-compass"></i>全部商品
        </div>
        <div class="nav-right">
            <a href="profile.html"><i class="fa fa-user-circle-o"></i></a>
        </div>
    </div>

    <!-- ========== 搜索栏 ========== -->
    <div class="search-bar-wrap">
        <div class="search-bar">
            <i class="fa fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜索饮品、小食…" maxlength="50">
            <button class="btn-search" id="btnSearch">搜索</button>
        </div>
    </div>

    <!-- ========== 瀑布流商品列表 ========== -->
    <div class="waterfall" id="waterfallContainer">
        <div class="empty-state">
            <i class="fa fa-spinner fa-spin"></i>
            <p>正在加载商品…</p>
        </div>
    </div>
    <div class="load-more-tip" id="loadMoreTip" style="display:none;"></div>

    <!-- ========== 底部导航 ========== -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="location.href='index.html'">
            <i class="fa fa-home"></i>
            <span>首页</span>
        </div>
        <div class="nav-item" onclick="location.href='category.html'">
            <i class="fa fa-th-large"></i>
            <span>分类</span>
        </div>
        <div class="nav-item active" onclick="location.href='list.html'">
            <i class="fa fa-compass"></i>
            <span>全部</span>
        </div>
        <div class="nav-item" onclick="location.href='profile.html'">
            <i class="fa fa-user"></i>
            <span>我的</span>
        </div>
    </div>

</div><!-- /.page-container -->

<script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
<script src="js/list.js"></script>
</body>
</html>
