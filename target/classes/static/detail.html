<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>商品详情 - 甜趣奶茶</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="css/common.css">
</head>
<body>

<header class="desktop-header" id="mainHeader">
  <div class="header-inner">
    <a href="index.html" class="header-brand">
      <div class="brand-icon"><i class="fa fa-leaf"></i></div>甜趣奶茶
    </a>
    <nav class="header-nav">
      <a class="nav-link" href="index.html">首页</a>
      <a class="nav-link" href="category.html">分类浏览</a>
      <a class="nav-link" href="list.html">全部商品</a>
      <a class="nav-link" href="profile.html">个人中心</a>
    </nav>
    <a href="profile.html" class="header-user-btn"><i class="fa fa-user-o"></i></a>
  </div>
</header>

<div class="page-container">
  <div class="detail-layout">

    <!-- 左侧大图 -->
    <div class="detail-gallery">
      <img id="detailImg" src="" alt="商品图片"
           onerror="this.style.display='none';this.parentElement.innerHTML='<div style=font-size:120px>🧋</div>'">
    </div>

    <!-- 右侧信息面板 -->
    <div class="detail-panel">
      <div class="dp-category" id="detailCategory">饮品</div>
      <h1 id="detailName">---</h1>
      <p class="dp-desc" id="detailDesc">---</p>
      <div class="dp-price-big"><span class="yen">¥</span><span id="detailPrice">0</span></div>
      <div class="dp-stock" id="detailStock">库存：0 杯</div>

      <!-- 甜度 -->
      <div class="spec-block">
        <div class="spec-label">🍯 甜度</div>
        <div class="spec-options" id="sweetnessOpts">
          <span class="spec-opt active" data-val="全糖">全糖</span>
          <span class="spec-opt" data-val="半糖">半糖</span>
          <span class="spec-opt" data-val="无糖">无糖</span>
        </div>
      </div>

      <!-- 冰量 -->
      <div class="spec-block">
        <div class="spec-label">🧊 冰量</div>
        <div class="spec-options" id="iceOpts">
          <span class="spec-opt active" data-val="正常">正常</span>
          <span class="spec-opt" data-val="少冰">少冰</span>
          <span class="spec-opt" data-val="去冰">去冰</span>
        </div>
      </div>

      <!-- 数量 -->
      <div class="qty-row">
        <span class="qty-label">📦 数量</span>
        <div class="qty-stepper">
          <button id="btnMinus" disabled><i class="fa fa-minus"></i></button>
          <span class="qty-val" id="qtyNum">1</span>
          <button id="btnPlus"><i class="fa fa-plus"></i></button>
        </div>
      </div>

      <!-- 下单 -->
      <div class="order-bar-detail">
        <div>
          <div class="ob-total-label">合计金额</div>
          <div class="ob-total-price"><span class="yen">¥</span><span id="totalPrice">0.00</span></div>
        </div>
        <button class="btn-order" id="btnSubmit" onclick="submitOrder()">立即下单</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-popup" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
<script src="js/detail.js"></script>
</body>
</html>
